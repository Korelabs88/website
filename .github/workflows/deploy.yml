name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Verificar secrets de Cloudflare
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Faltan secrets en GitHub → Settings → Secrets → Actions"
            echo "  CLOUDFLARE_API_TOKEN  (permiso: Cloudflare Pages Edit)"
            echo "  CLOUDFLARE_ACCOUNT_ID (Dashboard → Account ID)"
            echo ""
            echo "Crear token: https://developers.cloudflare.com/fundamentals/api/get-started/create-token/"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        run: |
          pip install -r requirements.txt
          python scripts/generate_guides.py
          python scripts/build.py

      - name: Publish to Cloudflare Pages
        id: cf_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=website --commit-dirty=true

      - name: Deploy falló — instrucciones
        if: failure() && steps.cf_deploy.outcome == 'failure'
        run: |
          echo "::error::No se pudo publicar en Cloudflare Pages."
          echo "1) Agregá CLOUDFLARE_API_TOKEN y CLOUDFLARE_ACCOUNT_ID en GitHub → Settings → Secrets"
          echo "2) O en Cloudflare → Workers & Pages → website → Deployments → Retry deployment"
          exit 1
